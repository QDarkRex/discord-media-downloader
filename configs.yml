# TikTok bot settings. Mounted into the container, so changes here only need
# `docker compose restart` (no rebuild).

prefix: "!"
activity_name: "TikTok"

# Monitoring (paced scheduler — sweeps all tracked accounts, evenly spaced)
sweep_target_seconds: 150   # re-check each account roughly every ~2.5 min
min_request_spacing: 1.5    # safety floor: never request faster than this (seconds)
request_jitter: 0.5         # +/- random seconds added to spacing (less robotic)
playlist_scan_count: 5      # how many recent videos to scan per check

# Experimental TikTok Stories (/tt add type:stories|both)
# Requires a logged-in TikTok burner cookies.txt. This uses Playwright to open
# the profile, click the avatar/story entry point, and sniff story video URLs.
# It is intentionally slow and can break when TikTok changes its web UI.
tiktok_story_enabled: false
tiktok_story_sweep_target_seconds: 1800   # re-check each story account roughly every ~30 min
tiktok_story_min_request_spacing: 45      # story checks launch a browser; keep them slow
tiktok_story_request_jitter: 10
tiktok_story_timeout: 45

# On-demand
auto_detect_links: true      # auto-download TikTok/Instagram links pasted in chat
suppress_link_embeds: true   # remove Discord's auto link-preview embed after the bot reposts it (needs "Manage Messages")

# Instagram (/ig command)
download_timeout: 180     # kill a gallery-dl download that runs longer than this (seconds)
max_files_per_post: 20    # safety cap on media files pulled from one IG carousel

# Instagram monitoring (/ig add) — deliberately SLOW: Instagram flags aggressive
# automated access. Accounts are sharded across the configured burners (IG_COOKIES),
# and each value below is applied PER BURNER. With 2 burners over ~45 accounts this
# lands new posts within ~10–15 min.
ig_sweep_target_seconds: 900    # per burner: re-check each of its accounts this often
ig_min_request_spacing: 20      # never request faster than this (seconds, per burner)
ig_request_jitter: 5            # +/- random seconds added to spacing
ig_playlist_scan_count: 3       # how many recent posts to scan per check

# TikTok video quality
tiktok_native: true       # true = native resolution even if h265 1080p (may not inline-preview on some
                          # clients); false = force h264 so it always plays inline (can cap TikTok at 720p)

# Upload handling
max_upload_mb: 50         # Discord Level 2 boost upload cap (~50 MB) — bigger cap = higher native res, less compression
compress_oversize: true   # try ffmpeg compression before falling back to a link
compress_timeout: 120     # kill an ffmpeg compress that runs longer than this (seconds)
